<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toathmor Studio - Font Tester Pro</title>
    
    <style>
        /* 🌐 @font-face ផ្ទុកពុម្ពអក្សរខ្មែរស្ដង់ដារ */
        @font-face {
            font-family: 'Kantumruy Pro';
            src: url('https://cdn.jsdelivr.net/gh/seanghai/khmer-fonts@master/assets/fonts/kantumruy-regular.woff2') format('woff2');
            font-weight: normal; font-display: swap;
        }
        @font-face {
            font-family: 'Khmer OS Muol Light';
            src: url('https://cdn.jsdelivr.net/gh/seanghai/khmer-fonts@master/assets/fonts/khmer-os-muol-light.woff2') format('woff2');
            font-display: swap;
        }
        @font-face {
            font-family: 'Khmer OS Battambang';
            src: url('https://cdn.jsdelivr.net/gh/seanghai/khmer-fonts@master/assets/fonts/khmer-os-battambang.woff2') format('woff2');
            font-display: swap;
        }
        @font-face {
            font-family: 'Siemreap';
            src: url('https://cdn.jsdelivr.net/gh/seanghai/khmer-fonts@master/assets/fonts/siemreap.woff2') format('woff2');
            font-display: swap;
        }

        /* 🎨 ការកំណត់ទម្រង់ពណ៌ Theme (Default: Dark Mode) */
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary-color: #4f46e5;
            --panel-bg: #0f172a;
            --card-inner: rgba(15, 23, 42, 0.6);
            --compact-bg: rgba(0, 0, 0, 0.2);
        }

        /* ☀️ ការកំណត់នៅពេលប្តូរទៅ Light Mode */
        [data-theme="light"] {
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --primary-color: #4f46e5;
            --panel-bg: #f8fafc;
            --card-inner: #f1f5f9;
            --compact-bg: #e2e8f0;
        }

        body {
            font-family: 'Kantumruy Pro', 'Khmer OS Battambang', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--bg-card);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            box-sizing: border-box;
            transition: background 0.3s;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .app-brand { display: flex; flex-direction: column; }
        .app-title { font-size: 18px; font-weight: 800; color: var(--text-main); letter-spacing: 0.5px; }
        .app-subtitle { font-size: 11px; color: #38bdf8; font-weight: bold; }

        /* ប៊ូតុងប្តូរ Dark / Light Mode */
        .theme-toggle-btn {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .theme-toggle-btn:hover { background: var(--border-color); }

        .upload-zone {
            background: #4f46e5;
            color: white;
            padding: 14px;
            border-radius: 14px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .control-panel {
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .spacing-inline-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .compact-slider-box {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .compact-slider-box span.icon { font-size: 14px; color: var(--text-muted); }
        .compact-slider-box input[type="range"] { flex: 1; accent-color: #4f46e5; height: 6px; }
        .compact-slider-box span.val { font-size: 11px; font-weight: bold; color: #38bdf8; min-width: 32px; text-align: right; }

        .color-setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
        }
        .quick-colors { display: flex; gap: 6px; align-items: center; }
        .color-circle { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid #ffffff; box-shadow: 0 0 4px rgba(0,0,0,0.2); }

        .blocks-manager { display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
        .block-card {
            background: var(--card-inner); 
            border: 1px solid var(--border-color);
            padding: 12px; 
            border-radius: 16px; 
            border-left: 5px solid #10b981;
        }

        .block-header-tools {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 10px; 
            font-size: 12px; 
            color: #38bdf8; 
            font-weight: bold;
        }

        .compact-row {
            display: grid;
            grid-template-columns: 55px 120px 30px 1fr 35px 30px;
            gap: 8px;
            align-items: center;
            background: var(--compact-bg);
            padding: 6px 10px;
            border-radius: 10px;
            margin-bottom: 6px;
        }
        .compact-label { font-size: 11px; color: var(--text-muted); font-weight: 600; }

        .inline-upload-btn {
            background: #334155; color: #38bdf8; border: 1px solid var(--border-color); border-radius: 6px;
            height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px;
        }

        select {
            background: var(--panel-bg); color: var(--text-main); border: 1px solid var(--border-color); padding: 6px;
            border-radius: 6px; font-family: inherit; font-size: 11px; width: 100%; height: 32px;
        }
        input[type="color"] { width: 100%; height: 32px; border: none; background: transparent; cursor: pointer; padding: 0; }

        .btn-add-block {
            background: #10b981; color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; font-family: inherit; margin-bottom: 20px; width: 100%; font-size: 13px;
        }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; }

        .preview-wrapper { 
            border: 1px solid var(--border-color); border-radius: 16px; overflow: auto; 
            margin-bottom: 20px; width: 100%; background: var(--panel-bg); display: flex; flex-direction: column;
        }
        
        .align-bar { background: var(--panel-bg); padding: 6px 14px; display: flex; gap: 6px; border-bottom: 1px solid var(--border-color); }
        .align-btn { background: transparent; border: none; color: var(--text-main); padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit;}
        .align-btn.active { background: var(--primary-color); color: white; }

        .preview-box { 
            padding: 35px; box-sizing: border-box; display: inline-block; 
            width: max-content; min-width: 250px; margin: 15px auto; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); background-color: #b45309;
        }
        
        .editable-text { outline: none; border-radius: 4px; }
        .editable-text:hover { background: rgba(255, 255, 255, 0.15); cursor: text; }
        .editable-text:focus { background: rgba(255, 255, 255, 0.25); box-shadow: 0 0 0 2px #38bdf8; }

        .preview-main-title { width: 100%; text-align: center; margin-bottom: 25px; font-weight: bold; font-size: 32px; color: #ffffff; display: block; }
        
        .line-row { 
            width: 100%; 
            display: flex; 
            align-items: flex-start; 
            justify-content: flex-start;
        }
        
        .inline-title { font-weight: bold; white-space: nowrap; flex-shrink: 0; margin-right: 8px; }
        .inline-desc { font-weight: normal; word-break: break-word; text-align: left; }

        .action-group { display: flex; gap: 10px; width: 100%; }
        .action-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-family: inherit; font-size: 14px; }
        .action-btn.save-img { background: #2563eb; color: white; }
        .action-btn.save-pdf { background: #475569; color: white; }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="container">
    <div class="app-header">
        <div class="app-brand">
            <span class="app-title">TOATHMOR STUDIO</span>
            <span class="app-subtitle">FONT TESTER PRO</span>
        </div>
        <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
    </div>

    <div class="upload-zone" onclick="document.getElementById('fontFile').click()">
        📥 ចុចបញ្ចូលពុម្ពអក្សររួម (.ttf, .otf, .woff)
    </div>
    <input type="file" id="fontFile" accept=".ttf,.otf,.woff" style="display:none" onchange="loadGlobalCustomFont(this)">

    <div style="background: rgba(56, 189, 248, 0.05); border: 1px dashed #38bdf8; padding: 12px; border-radius: 14px; margin-bottom: 15px;">
        <div style="font-size:12px; font-weight:bold; color:#38bdf8; margin-bottom:8px;">👑 ម៉ូដចំណងជើងធំ (Main Title Style)</div>
        <div style="display: grid; grid-template-columns: 110px 35px 1fr 35px 30px; gap: 8px; align-items: center;">
            <select id="mainTitleFont" onchange="applyMainTitleStyles()">
                <option value="Khmer OS Muol Light">Khmer OS Muol Light</option>
                <option value="Kantumruy Pro" selected>Kantumruy Pro</option>
                <option value="Khmer OS Battambang">Khmer OS Battambang</option>
                <option value="Siemreap">Siemreap</option>
            </select>
            <div class="inline-upload-btn" title="ផ្ទុកពុម្ពអក្សរ" onclick="triggerInlineFontUpload('mainTitleFont')">📁</div>
            <input type="range" id="mainTitleSize" min="14" max="80" value="32" oninput="applyMainTitleStyles()">
            <span class="size-badge" id="lbl_mainTitleSize">32px</span>
            <input type="color" id="mainTitleColor" value="#ffffff" oninput="applyMainTitleStyles()">
        </div>
    </div>

    <div class="blocks-manager" id="blocksManager"></div>
    <button class="btn-add-block" onclick="addNewLineBlock()">➕ បន្ថែមជួរអក្សរឆ្លាស់គ្នាថ្មី</button>

    <input type="file" id="inlineFontOpener" accept=".ttf,.otf,.woff" style="display:none" onchange="handleInlineFontLoaded(this)">

    <div class="preview-wrapper">
        <div class="control-panel">
            <div class="spacing-inline-row">
                <div class="compact-slider-box" title="គម្លាតបណ្តោយជួរ (Line Height)">
                    <span class="icon">↕️</span>
                    <input type="range" id="globalLineHeight" min="1.0" max="3.5" step="0.1" value="1.8" oninput="applyAllStyles()">
                    <span class="val" id="valLineHeight">1.8</span>
                </div>
                
                <div class="compact-slider-box" title="គម្លាតទទឹងតួអក្សរ (Letter Spacing)">
                    <span class="icon">↔️</span>
                    <input type="range" id="globalLetterSpacing" min="-2" max="10" step="0.5" value="0" oninput="applyAllStyles()">
                    <span class="val" id="valLetterSpacing">0px</span>
                </div>
            </div>

            <div class="color-setting-row">
                <label style="font-size: 11px; color: var(--text-muted); font-weight: bold;">🎨 ពណ៌ផ្ទៃក្រោយ:</label>
                <div class="quick-colors">
                    <div class="color-circle" style="background: #ffffff;" onclick="setCanvasBg('#ffffff')"></div>
                    <div class="color-circle" style="background: #0f172a;" onclick="setCanvasBg('#0f172a')"></div>
                    <div class="color-circle" style="background: #1e3a8a;" onclick="setCanvasBg('#1e3a8a')"></div>
                    <div class="color-circle" style="background: #b45309;" onclick="setCanvasBg('#b45309')"></div>
                    <input type="color" id="customBgColor" value="#b45309" style="width:18px; height:18px; border:none; background:transparent;" oninput="setCanvasBg(this.value)">
                </div>
            </div>
        </div>

        <div class="align-bar">
            <button class="align-btn active" id="btnLeft" onclick="setAlign('left')">ឆ្វេង</button>
            <button class="align-btn" id="btnCenter" onclick="setAlign('center')">កណ្តាល</button>
            <button class="align-btn" id="btnRight" onclick="setAlign('right')">ស្តាំ</button>
        </div>

        <div style="width: 100%; text-align: center;">
            <div class="preview-box" id="previewBox">
                <div class="preview-main-title editable-text" id="previewMainTitle" contenteditable="true">សតិបដ្ឋានធម៌ ៤</div>
                <div id="linesContainer"></div>
            </div>
        </div>
    </div>

    <div class="action-group">
        <button class="action-btn save-img" onclick="exportAsImage()">🖼️ រក្សាទុករូបភាព</button>
        <button class="action-btn save-pdf" onclick="exportAsPDF()">📄 ទាញយកជា PDF</button>
    </div>
</div>

<script>
    let blockCount = 0;
    let textAlign = 'left';
    const customFontList = [];
    let currentTargetSelectId = null;

    // 🌗 អនុគមន៍ប្តូរ Dark Mode / Light Mode
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const targetTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', targetTheme);
        
        const btn = document.getElementById('themeBtn');
        if (targetTheme === 'light') {
            btn.innerHTML = "☀️ Light Mode";
        } else {
            btn.innerHTML = "🌙 Dark Mode";
        }
    }

    function applyMainTitleStyles() {
        const mainTitleEl = document.getElementById('previewMainTitle');
        const sizeVal = document.getElementById('mainTitleSize').value;
        document.getElementById('lbl_mainTitleSize').textContent = sizeVal + 'px';
        
        mainTitleEl.style.fontFamily = document.getElementById('mainTitleFont').value;
        mainTitleEl.style.fontSize = sizeVal + 'px';
        mainTitleEl.style.color = document.getElementById('mainTitleColor').value;
    }

    function addNewLineBlock(initTitle = "១. កាយានុបស្សនា៖", initDesc = "ការពិចារណាពិនិត្យមើលរូបកាយជាប្រចាំ។", titleColor = "#fcd34d", descColor = "#ffffff", titleSize = 22, descSize = 18) {
        blockCount++;
        const id = blockCount;

        const card = document.createElement('div');
        card.className = 'block-card';
        card.id = `block_card_${id}`;
        card.setAttribute('data-id', id);

        let fontOptionsHtml = `
            <option value="Khmer OS Muol Light">Khmer OS Muol Light</option>
            <option value="Kantumruy Pro">Kantumruy Pro</option>
            <option value="Khmer OS Battambang">Khmer OS Battambang</option>
            <option value="Siemreap">Siemreap</option>
        `;
        customFontList.forEach(f => { fontOptionsHtml += `<option value="${f.value}">${f.text}</option>`; });

        card.innerHTML = `
            <div class="block-header-tools">
                <span>📝 ជួរអក្សរឆ្លាស់គ្នាទី #${id}</span>
                <button class="btn-delete" onclick="removeLineBlock(${id})">❌ លុប</button>
            </div>
            
            <div class="compact-row">
                <span class="compact-label">🅰️ Title:</span>
                <select id="font_title_${id}" onchange="applyLineStyles(${id})">${fontOptionsHtml}</select>
                <div class="inline-upload-btn" title="បញ្ចូលពុម្ពផ្ទាល់ខ្លួន" onclick="triggerInlineFontUpload('font_title_${id}')">📁</div>
                <input type="range" id="size_title_${id}" min="10" max="60" value="${titleSize}" oninput="applyLineStyles(${id})">
                <span class="size-badge" id="lbl_title_${id}">${titleSize}px</span>
                <input type="color" id="color_title_${id}" value="${titleColor}" oninput="applyLineStyles(${id})">
            </div>
            
            <div class="compact-row">
                <span class="compact-label">🔤 Body:</span>
                <select id="font_desc_${id}" onchange="applyLineStyles(${id})">${fontOptionsHtml}</select>
                <div class="inline-upload-btn" title="បញ្ចូលពុម្ពផ្ទាល់ខ្លួន" onclick="triggerInlineFontUpload('font_desc_${id}')">📁</div>
                <input type="range" id="size_desc_${id}" min="10" max="60" value="${descSize}" oninput="applyLineStyles(${id})">
                <span class="size-badge" id="lbl_desc_${id}">${descSize}px</span>
                <input type="color" id="color_desc_${id}" value="${descColor}" oninput="applyLineStyles(${id})">
            </div>
        `;

        document.getElementById('blocksManager').appendChild(card);
        document.getElementById(`font_title_${id}`).value = "Khmer OS Muol Light";
        document.getElementById(`font_desc_${id}`).value = "Kantumruy Pro";

        const previewRow = document.createElement('div');
        previewRow.className = 'line-row';
        previewRow.id = `preview_row_${id}`;
        previewRow.innerHTML = `
            <span class="inline-title editable-text" id="p_title_${id}" contenteditable="true">${initTitle}</span>
            <span class="inline-desc editable-text" id="p_desc_${id}" contenteditable="true">${initDesc}</span>
        `;
        document.getElementById('linesContainer').appendChild(previewRow);

        applyLineStyles(id);
        applyAllStyles();
    }

    function removeLineBlock(id) {
        document.getElementById(`block_card_${id}`).remove();
        document.getElementById(`preview_row_${id}`).remove();
    }

    function applyLineStyles(id) {
        const titleSpan = document.getElementById(`p_title_${id}`);
        const descSpan = document.getElementById(`p_desc_${id}`);

        if (titleSpan && descSpan) {
            const titleSize = document.getElementById(`size_title_${id}`).value;
            document.getElementById(`lbl_title_${id}`).textContent = titleSize + 'px';
            titleSpan.style.fontFamily = document.getElementById(`font_title_${id}`).value;
            titleSpan.style.fontSize = titleSize + 'px';
            titleSpan.style.color = document.getElementById(`color_title_${id}`).value;

            const descSize = document.getElementById(`size_desc_${id}`).value;
            document.getElementById(`lbl_desc_${id}`).textContent = descSize + 'px';
            descSpan.style.fontFamily = document.getElementById(`font_desc_${id}`).value;
            descSpan.style.fontSize = descSize + 'px';
            descSpan.style.color = document.getElementById(`color_desc_${id}`).value;
        }
    }

    function applyAllStyles() {
        const lh = document.getElementById('globalLineHeight').value;
        const ls = document.getElementById('globalLetterSpacing').value;

        document.getElementById('valLineHeight').textContent = lh;
        document.getElementById('valLetterSpacing').textContent = ls + 'px';

        document.querySelectorAll('.line-row').forEach(row => {
            row.style.lineHeight = lh;
            row.style.letterSpacing = ls + 'px';
            
            if (textAlign === 'center') {
                row.style.justifyContent = 'center';
            } else if (textAlign === 'right') {
                row.style.justifyContent = 'flex-end';
            } else {
                row.style.justifyContent = 'flex-start';
            }
            row.style.marginBottom = (parseFloat(lh) * 12) + "px";
        });
        
        document.getElementById('previewMainTitle').style.letterSpacing = ls + 'px';
        document.getElementById('previewMainTitle').style.textAlign = textAlign;
    }

    function setCanvasBg(bgHex) {
        document.getElementById('customBgColor').value = bgHex;
        document.getElementById('previewBox').style.backgroundColor = bgHex;
    }

    function setAlign(type) {
        textAlign = type;
        document.querySelectorAll('.align-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn${type.charAt(0).toUpperCase() + type.slice(1)}`).classList.add('active');
        applyAllStyles();
    }

    function triggerInlineFontUpload(selectId) {
        currentTargetSelectId = selectId;
        document.getElementById('inlineFontOpener').click();
    }

    function handleInlineFontLoaded(input) {
        const file = input.files[0]; if (!file || !currentTargetSelectId) return;
        const fontName = 'Inline_' + file.name.replace(/[^a-zA-Z0-9]/g, '') + '_' + Date.now();
        const reader = new FileReader();

        reader.onload = function(e) {
            const injectedFont = new FontFace(fontName, `url(${e.target.result})`);
            injectedFont.load().then(function(loaded) {
                document.fonts.add(loaded);
                const fontValue = fontName;
                const fontText = `⭐ ${file.name}`;

                customFontList.push({ value: fontValue, text: fontText });
                
                document.querySelectorAll('.block-card select, #mainTitleFont').forEach(select => {
                    const opt = document.createElement('option');
                    opt.value = fontValue; opt.textContent = fontText;
                    select.appendChild(opt);
                });

                const targetSelect = document.getElementById(currentTargetSelectId);
                if (targetSelect) {
                    targetSelect.value = fontValue;
                    if (currentTargetSelectId === 'mainTitleFont') {
                        applyMainTitleStyles();
                    } else {
                        const blockId = currentTargetSelectId.split('_').pop();
                        applyLineStyles(blockId);
                    }
                }
                input.value = '';
            }).catch(() => alert("ការផ្ទុកពុម្ពអក្សរមានបញ្ហា!"));
        };
        reader.readAsDataURL(file);
    }

    function loadGlobalCustomFont(input) {
        const file = input.files[0]; if (!file) return;
        const fontName = 'Global_' + file.name.replace(/[^a-zA-Z0-9]/g, '') + '_' + Date.now();
        const reader = new FileReader();
        reader.onload = function(e) {
            const injectedFont = new FontFace(fontName, `url(${e.target.result})`);
            injectedFont.load().then(function(loaded) {
                document.fonts.add(loaded);
                customFontList.push({ value: fontName, text: `⭐ ${file.name}` });
                
                document.querySelectorAll('.block-card select, #mainTitleFont').forEach(select => {
                    const opt = document.createElement('option');
                    opt.value = fontName; opt.textContent = `⭐ ${file.name}`;
                    select.appendChild(opt);
                });
                alert(`បានបញ្ចូលពុម្ពអក្សរ "${file.name}" ទៅក្នុងបញ្ជីរួមរួចរាល់!`);
            }).catch(() => alert("ការផ្ទុកពុម្ពអក្សរមានបញ្ហា!"));
        };
        reader.readAsDataURL(file);
    }

    // 🎨 អនុគមន៍គូរអក្សរដែលមានការគិតគូរពី Letter Spacing ទៅលើ Canvas
    function drawTextWithSpacing(ctx, text, x, y, spacing, alignment, totalWidth) {
        let currentX = x;
        if (alignment === 'center') {
            let textWidth = ctx.measureText(text).width + (text.length - 1) * spacing;
            currentX = (totalWidth - textWidth) / 2;
        } else if (alignment === 'right') {
            let textWidth = ctx.measureText(text).width + (text.length - 1) * spacing;
            currentX = totalWidth - 45 - textWidth;
        }

        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            ctx.fillText(char, currentX, y);
            currentX += ctx.measureText(char).width + spacing;
        }
        return currentX;
    }

    function renderToCanvas(callback) {
        document.fonts.ready.then(() => {
            const bgColor = document.getElementById('customBgColor').value;
            const lh = parseFloat(document.getElementById('globalLineHeight').value);
            const ls = parseFloat(document.getElementById('globalLetterSpacing').value);
            
            const mainFontRaw = document.getElementById('mainTitleFont').value.replace(/'/g, "");

            const mainTitleData = {
                text: document.getElementById('previewMainTitle').innerText,
                font: `bold ${document.getElementById('mainTitleSize').value}px "${mainFontRaw}", sans-serif`,
                size: parseInt(document.getElementById('mainTitleSize').value),
                color: document.getElementById('mainTitleColor').value
            };

            const compiledBlocks = [];
            document.querySelectorAll('.block-card').forEach(card => {
                const id = card.getAttribute('data-id');
                const tFontRaw = document.getElementById(`font_title_${id}`).value.replace(/'/g, "");
                const dFontRaw = document.getElementById(`font_desc_${id}`).value.replace(/'/g, "");

                compiledBlocks.push({
                    titleText: document.getElementById(`p_title_${id}`).innerText + " ",
                    titleFont: `bold ${document.getElementById(`size_title_${id}`).value}px "${tFontRaw}", sans-serif`,
                    titleSize: parseInt(document.getElementById(`size_title_${id}`).value),
                    titleColor: document.getElementById(`color_title_${id}`).value,
                    
                    descText: document.getElementById(`p_desc_${id}`).innerText,
                    descFont: `normal ${document.getElementById(`size_desc_${id}`).value}px "${dFontRaw}", sans-serif`,
                    descSize: parseInt(document.getElementById(`size_desc_${id}`).value),
                    descColor: document.getElementById(`color_desc_${id}`).value
                });
            });

            const dummyCanvas = document.createElement('canvas');
            const dummyCtx = dummyCanvas.getContext('2d');
            
            let maxRowWidth = 250; 
            let totalHeight = 70; 

            if(mainTitleData.text.trim()) {
                dummyCtx.font = mainTitleData.font;
                let wMain = dummyCtx.measureText(mainTitleData.text).width + (mainTitleData.text.length - 1) * ls;
                maxRowWidth = Math.max(maxRowWidth, wMain);
                totalHeight += (mainTitleData.size * 1.5) + 30;
            }

            compiledBlocks.forEach(b => {
                dummyCtx.font = b.titleFont;
                let wTitle = dummyCtx.measureText(b.titleText).width + (b.titleText.length * ls);
                dummyCtx.font = b.descFont;
                let wDesc = dummyCtx.measureText(b.descText).width + (b.descText.length * ls);
                
                maxRowWidth = Math.max(maxRowWidth, wTitle + wDesc);
                let maxFontSize = Math.max(b.titleSize, b.descSize);
                totalHeight += (maxFontSize * lh) + 24;
            });

            const paddingX = 45;
            const canvasWidth = Math.ceil(maxRowWidth + (paddingX * 2));
            totalHeight += 20;

            const scale = 3;
            const canvas = document.createElement('canvas');
            canvas.width = canvasWidth * scale; canvas.height = totalHeight * scale;
            const ctx = canvas.getContext('2d');
            ctx.scale(scale, scale);
            
            ctx.fillStyle = bgColor; ctx.fillRect(0, 0, canvasWidth, totalHeight);
            ctx.textBaseline = "top";

            let currentY = 50;

            if(mainTitleData.text.trim()) {
                ctx.font = mainTitleData.font; ctx.fillStyle = mainTitleData.color;
                let drawX = paddingX;
                if(textAlign === 'center') drawX = canvasWidth / 2;
                if(textAlign === 'right') drawX = canvasWidth - paddingX;
                
                drawTextWithSpacing(ctx, mainTitleData.text, drawX, currentY, ls, textAlign, canvasWidth);
                currentY += (mainTitleData.size * 1.5) + 30;
            }

            compiledBlocks.forEach(b => {
                let maxFontSize = Math.max(b.titleSize, b.descSize);

                if(textAlign === 'center' || textAlign === 'right') {
                    let fullText = b.titleText + b.descText;
                    let drawX = textAlign === 'center' ? canvasWidth / 2 : canvasWidth - paddingX;
                    ctx.font = b.titleFont; ctx.fillStyle = b.titleColor;
                    drawTextWithSpacing(ctx, fullText, drawX, currentY, ls, textAlign, canvasWidth);
                } else {
                    ctx.font = b.titleFont; ctx.fillStyle = b.titleColor;
                    let nextX = drawTextWithSpacing(ctx, b.titleText, paddingX, currentY, ls, 'left', canvasWidth);
                    
                    ctx.font = b.descFont; ctx.fillStyle = b.descColor;
                    drawTextWithSpacing(ctx, b.descText, nextX, currentY, ls, 'left', canvasWidth);
                }

                currentY += (maxFontSize * lh) + 24;
            });

            callback(canvas.toDataURL('image/png'), canvasWidth, totalHeight);
        });
    }

    function exportAsImage() {
        renderToCanvas((pngUrl) => {
            const link = document.createElement('a');
            link.download = 'toathmor-tester-pro.png';
            link.href = pngUrl; link.click();
        });
    }

    function exportAsPDF() {
        renderToCanvas((pngUrl, w, h) => {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF(w > h ? 'l' : 'p', 'px', [w, h]);
            pdf.addImage(pngUrl, 'PNG', 0, 0, w, h);
            pdf.save('toathmor-tester-pro.pdf');
        });
    }

    // បង្កើតទម្រង់គំរូដំបូង
    addNewLineBlock('១. កាយានុបស្សនា៖', 'ការពិចារណាពិនិត្យមើលរូបកាយជាប្រចាំ។', '#fcd34d', '#ffffff', 22, 18);
    addNewLineBlock('២. វេទនានុបស្សនា៖', 'ការពិនិត្យមើលរាល់សេចក្តីសុខទុក្ខរបស់ចិត្ត។', '#fcd34d', '#ffffff', 22, 18);

    applyMainTitleStyles();
    setCanvasBg('#b45309');
</script>
